name: "GWAS Paper Reproduction"
description: >-
  Reproduce headline findings from 10 landmark GWAS papers using ClawBio skills.
  The agent must identify lead variants, effect sizes, biological pathways,
  and overall locus counts. Skills are iteratively modified to improve
  reproduction accuracy.
metric: "reproduction_score"
direction: "higher_is_better"
scale: [0, 10]
skills_dir: "../../"

papers:
  - id: "paper_001"
    title: "Nalls et al. 2019 — Parkinson's disease GWAS meta-analysis"
    pmid: "31701892"
    ground_truth: "ground_truth/paper_001.yaml"
  - id: "paper_002"
    title: "Wightman et al. 2021 — Alzheimer's disease GWAS"
    pmid: "34493870"
    ground_truth: "ground_truth/paper_002.yaml"
